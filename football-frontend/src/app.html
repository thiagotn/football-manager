<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <link rel="icon" href="%sveltekit.assets%/favicon-32x32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="%sveltekit.assets%/favicon-16x16.png" type="image/png" sizes="16x16" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#15803d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="rachao" />
    <meta name="description" content="rachao.app — organize sua pelada ou rachão de futebol society sem precisar instalar app. Confirme presenças, sorteie times e acompanhe estatísticas pelo celular." />

    <!-- Open Graph / WhatsApp / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="rachao.app" />
    <meta property="og:url" content="https://rachao.app" />
    <meta property="og:title" content="rachao.app — Organize seus rachões com facilidade" />
    <meta property="og:description" content="rachao.app — organize sua pelada ou rachão de futebol society sem precisar instalar app. Confirme presenças, sorteie times e acompanhe estatísticas pelo celular." />
    <meta property="og:image" content="https://rachao.app/banner-lp.jpg" />
    <meta property="og:image:width" content="1920" />
    <meta property="og:image:height" content="600" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="rachao.app — Organize seus rachões com facilidade" />
    <meta name="twitter:description" content="rachao.app — organize sua pelada ou rachão de futebol society sem precisar instalar app. Confirme presenças, sorteie times e acompanhe estatísticas pelo celular." />
    <meta name="twitter:image" content="https://rachao.app/banner-lp.jpg" />

    <script>
      (function() {
        const theme = localStorage.getItem('theme') ?? 'dark';
        if (theme === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="svelte">%sveltekit.body%</div>
  </body>
</html>
