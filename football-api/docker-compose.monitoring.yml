name: football-monitoring

# ─────────────────────────────────────────────────────────────────────────────
# Stack de monitoramento — desenvolvimento local
# Portas expostas diretamente (sem Traefik)
#
# Pré-requisito: a stack principal já deve estar rodando (make up)
#
# Uso:
#   make monitoring        → sobe a stack
#   make monitoring-down   → derruba a stack
#
# Acesso:
#   Grafana:      http://localhost:3001  (admin / admin)
#   Prometheus:   http://localhost:9090
#   Uptime Kuma:  http://localhost:3002
#   cAdvisor:     http://localhost:8081
#   Node Exporter: http://localhost:9100/metrics
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: football-monitoring-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring-net
      - app-net

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: football-monitoring-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring-net

  # ── cAdvisor ─────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: football-monitoring-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=10s"
      - "--store_container_labels=true"
    ports:
      - "8081:8080"
    networks:
      - monitoring-net

  # ── Node Exporter ─────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: football-monitoring-node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - monitoring-net

  # ── Uptime Kuma ───────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: football-monitoring-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      - "3002:3001"
    networks:
      - monitoring-net

volumes:
  prometheus-data:
  grafana-data:
  uptime-kuma-data:

networks:
  monitoring-net:
    driver: bridge
  # Rede da aplicação — deve existir antes de subir esta stack
  app-net:
    external: true
    name: football-manager_app-net
