global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Métricas da API v1 FastAPI (/metrics exposto pelo prometheus-fastapi-instrumentator)
  - job_name: 'api'
    static_configs:
      - targets: ['football-api:8000']
    metrics_path: '/metrics'

  # Métricas da API v2 Go (/metrics exposto pelo middleware de instrumentação)
  - job_name: 'api-go'
    static_configs:
      - targets: ['football-api-go:8080']
    metrics_path: '/metrics'

  # Métricas dos containers Docker (CPU, RAM, rede por container)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Métricas do host (CPU, RAM, disco, rede da máquina)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
