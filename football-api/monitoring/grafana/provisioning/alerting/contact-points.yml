apiVersion: 1

contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: telegram-receiver
        type: telegram
        settings:
          bottoken: "${TELEGRAM_BOT_TOKEN}"
          chatid: '${TELEGRAM_CHAT_ID}'
          message: |
            {{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} *{{ .CommonLabels.alertname }}*

            {{ range .Alerts }}
            📌 {{ .Annotations.summary }}
            {{ if .Annotations.description }}📊 {{ .Annotations.description }}{{ end }}
            🕐 {{ .StartsAt.Format "02/01 15:04" }}
            {{ end }}
          parse_mode: Markdown
        disableResolveMessage: false
