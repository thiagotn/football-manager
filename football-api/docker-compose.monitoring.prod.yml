name: football-monitoring

# ─────────────────────────────────────────────────────────────────────────────
# Stack de monitoramento — produção (VPS)
# Sem portas expostas — acesso via Traefik (traefik-dynamic.yml)
#
# Pré-requisito: stack principal já rodando (docker-compose.prod.yml)
#
# Uso no VPS:
#   docker compose -f docker-compose.monitoring.prod.yml --env-file .env.monitoring up -d
#
# Acesso após DNS configurado:
#   https://grafana.rachao.app       (login: admin / ver .env.monitoring)
#   https://uptime.rachao.app        (cadastro no primeiro acesso)
#   https://prometheus.rachao.app    (Basic Auth: ver traefik-dynamic.yml)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: football-monitoring-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring-net
      - app-net

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: football-monitoring-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://grafana.rachao.app
      GF_SERVER_DOMAIN: grafana.rachao.app
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring-net
      - app-net

  # ── cAdvisor ─────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    # Nota: requer Docker com storage driver overlay2 (padrão no VPS com Ubuntu 24.04)
    # Se o VPS usa overlayfs (Docker 29.x+), o cAdvisor não detectará containers por nome
    container_name: football-monitoring-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=10s"
      - "--store_container_labels=true"
    networks:
      - monitoring-net

  # ── Node Exporter ─────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: football-monitoring-node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring-net

  # ── Uptime Kuma ───────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: football-monitoring-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - monitoring-net
      - app-net

volumes:
  prometheus-data:
  grafana-data:
  uptime-kuma-data:

networks:
  monitoring-net:
    driver: bridge
  # Rede compartilhada com a aplicação — Traefik roteia para estes containers
  app-net:
    external: true
    name: football-manager_app-net
