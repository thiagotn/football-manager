http:

  routers:
    api:
      rule: "Host(`api.rachao.app`)"
      entrypoints: [websecure]
      tls:
        certResolver: letsencrypt
      service: api

    frontend:
      rule: "Host(`rachao.app`)"
      entrypoints: [websecure]
      tls:
        certResolver: letsencrypt
        domains:
          - main: rachao.app
            sans: [www.rachao.app]
      service: frontend

    www:
      rule: "Host(`www.rachao.app`)"
      entrypoints: [websecure]
      tls:
        certResolver: letsencrypt
      middlewares: [www-redirect]
      service: frontend

    mcp:
      rule: "Host(`mcp.rachao.app`)"
      entrypoints: [websecure]
      tls:
        certResolver: letsencrypt
      service: mcp

    # ── Monitoramento ────────────────────────────────────────────
    grafana:
      rule: "Host(`grafana.rachao.app`)"
      entrypoints: [websecure]
      tls:
        certResolver: letsencrypt
      service: grafana

    uptime:
      rule: "Host(`uptime.rachao.app`)"
      entrypoints: [websecure]
      tls:
        certResolver: letsencrypt
      service: uptime-kuma

    prometheus:
      rule: "Host(`prometheus.rachao.app`)"
      entrypoints: [websecure]
      tls:
        certResolver: letsencrypt
      middlewares: [monitoring-auth]
      service: prometheus

    status:
      rule: "Host(`status.rachao.app`)"
      entrypoints: [websecure]
      tls:
        certResolver: letsencrypt
      middlewares: [status-redirect]
      service: uptime-kuma

  services:
    api:
      loadBalancer:
        servers:
          - url: "http://api:8000"

    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"

    mcp:
      loadBalancer:
        servers:
          - url: "http://mcp:8080"
        responseForwarding:
          flushInterval: "100ms"

    # ── Monitoramento ────────────────────────────────────────────
    grafana:
      loadBalancer:
        servers:
          - url: "http://football-monitoring-grafana:3000"

    uptime-kuma:
      loadBalancer:
        servers:
          - url: "http://football-monitoring-uptime-kuma:3001"

    prometheus:
      loadBalancer:
        servers:
          - url: "http://football-monitoring-prometheus:9090"

  middlewares:
    www-redirect:
      redirectRegex:
        regex: "^https://www\\.rachao\\.app(.*)"
        replacement: "https://rachao.app${1}"
        permanent: true

    status-redirect:
      redirectRegex:
        regex: ".*"
        replacement: "https://uptime.rachao.app/status/rachao"
        permanent: true

    # Basic Auth para o Prometheus
    # Senha padrão: monitoring123 — troque no VPS com: htpasswd -nb admin NOVA_SENHA
    # e atualize diretamente em /opt/football-manager/traefik-dynamic.yml (sem precisar de redeploy)
    monitoring-auth:
      basicAuth:
        users:
          - "admin:$apr1$S3knzfXa$Ywo4.8EjgPz5ukMgKw1Ht/"
