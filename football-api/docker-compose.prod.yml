name: football-manager

services:

  # ── Traefik Reverse Proxy ──────────────────────────────────────
  traefik:
    image: traefik:v3.2
    container_name: football-traefik
    restart: unless-stopped
    command:
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
      - letsencrypt:/letsencrypt
    networks:
      - app-net

  # ── API FastAPI ────────────────────────────────────────────────
  api:
    image: ghcr.io/thiagotn/football-manager-api:latest
    container_name: football-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: https://rachao.app
      DEBUG: "false"
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_BASIC_MONTHLY: ${STRIPE_PRICE_BASIC_MONTHLY}
      STRIPE_PRICE_BASIC_YEARLY: ${STRIPE_PRICE_BASIC_YEARLY}
      STRIPE_PRICE_PRO_MONTHLY: ${STRIPE_PRICE_PRO_MONTHLY}
      STRIPE_PRICE_PRO_YEARLY: ${STRIPE_PRICE_PRO_YEARLY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_VERIFY_SID: ${TWILIO_VERIFY_SID}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      FRONTEND_URL: https://rachao.app
    networks:
      - app-net

  # ── Frontend SvelteKit ─────────────────────────────────────────
  frontend:
    image: ghcr.io/thiagotn/football-manager-frontend:latest
    container_name: football-frontend
    restart: unless-stopped
    environment:
      ORIGIN: https://rachao.app
      API_INTERNAL_URL: http://api:8000/api/v1
    depends_on:
      - api
    networks:
      - app-net

  # ── MCP Server ────────────────────────────────────────────────
  mcp:
    image: ghcr.io/thiagotn/football-manager-mcp:latest
    container_name: football-mcp
    restart: unless-stopped
    environment:
      RACHAO_TOKEN: ${MCP_RACHAO_TOKEN}
      RACHAO_API_URL: https://api.rachao.app/api/v1
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8080
      RACHAO_MCP_READ_ONLY: "false"
    expose:
      - "8080"
    networks:
      - app-net

volumes:
  letsencrypt:

networks:
  app-net:
    driver: bridge
