name: football-manager

services:

  # ── Traefik Reverse Proxy ──────────────────────────────────────
  traefik:
    image: traefik:v3.2
    container_name: football-traefik
    restart: unless-stopped
    command:
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
      - letsencrypt:/letsencrypt
    networks:
      - app-net

  # ── Banco de Dados ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: football-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  # ── API FastAPI ────────────────────────────────────────────────
  api:
    image: ghcr.io/thiagotn/football-manager-api:latest
    container_name: football-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: https://rachao.app
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

  # ── Frontend SvelteKit ─────────────────────────────────────────
  frontend:
    image: ghcr.io/thiagotn/football-manager-frontend:latest
    container_name: football-frontend
    restart: unless-stopped
    environment:
      ORIGIN: https://rachao.app
      API_INTERNAL_URL: http://api:8000/api/v1
    depends_on:
      - api
    networks:
      - app-net

volumes:
  postgres-data:
  letsencrypt:

networks:
  app-net:
    driver: bridge
