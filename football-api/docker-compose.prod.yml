name: football-manager

services:

  # ── Traefik Reverse Proxy ──────────────────────────────────────
  traefik:
    image: traefik:v3.2
    container_name: football-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=app-net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - app-net

  # ── Banco de Dados ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: football-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  # ── API FastAPI ────────────────────────────────────────────────
  api:
    image: ghcr.io/thiagotn/football-manager-api:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: football-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: https://rachao.app
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.rachao.app`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # ── Frontend SvelteKit ─────────────────────────────────────────
  frontend:
    image: ghcr.io/thiagotn/football-manager-frontend:latest
    build:
      context: ../football-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.rachao.app/api/v1
    container_name: football-frontend
    restart: unless-stopped
    environment:
      ORIGIN: https://rachao.app
    depends_on:
      - api
    networks:
      - app-net
    labels:
      - "traefik.enable=true"
      # Rota principal: rachao.app
      - "traefik.http.routers.frontend.rule=Host(`rachao.app`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.tls.domains[0].main=rachao.app"
      - "traefik.http.routers.frontend.tls.domains[0].sans=www.rachao.app"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      # Redirect www.rachao.app → rachao.app
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.rachao\\.app(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://rachao.app$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.www.rule=Host(`www.rachao.app`)"
      - "traefik.http.routers.www.entrypoints=websecure"
      - "traefik.http.routers.www.tls=true"
      - "traefik.http.routers.www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.www.middlewares=www-redirect"
      - "traefik.http.routers.www.service=frontend"

volumes:
  postgres-data:
  letsencrypt:

networks:
  app-net:
    driver: bridge
