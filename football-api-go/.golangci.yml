version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - misspell
    - goimports
    - exhaustive
    - noctx
    - bodyclose
    - ineffassign
    - unused

linters-settings:
  goimports:
    local-prefixes: github.com/thiagotn/football-manager/football-api-go
  gosec:
    excludes:
      - G115  # integer overflow — acceptable in handler code
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - gosec
        - errcheck

run:
  timeout: 5m
