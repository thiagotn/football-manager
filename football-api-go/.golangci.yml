version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - misspell
    - goimports
    - exhaustive
    - noctx
    - bodyclose
    - ineffassign
    - unused
  settings:
    goimports:
      local-prefixes: github.com/thiagotn/football-manager/football-api-go
    gosec:
      excludes:
        - G115
    exhaustive:
      default-signifies-exhaustive: true
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - gosec
          - errcheck

run:
  timeout: 5m
