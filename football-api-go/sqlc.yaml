version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries/"
    schema: "../football-api/migrations/"
    gen:
      go:
        package: "db"
        out: "internal/db/generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "pg_catalog.uuid"
            go_type: "github.com/google/uuid.UUID"
