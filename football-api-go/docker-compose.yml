services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football
      POSTGRES_DB: football_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football -d football_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-go:
    build:
      context: .
      target: dev
    env_file: .env
    environment:
      DATABASE_URL: postgres://football:football@postgres:5432/football_dev?sslmode=disable
    ports:
      - "8001:8080"
    volumes:
      - .:/app
      - go_cache:/root/.cache/go-build
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  go_cache:
  go_mod_cache:
