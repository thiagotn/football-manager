# Build da imagem do frontend para o HOMELAB (API v2) — tag fixa :homelab-v2.
# Existe porque o main.yml builda o frontend com VITE_API_URL=/api/v1 (prod atual no VPS);
# o homelab serve a API Go v2 (ADR 0002 do repo homelab). VITE_API_URL é build-time, então
# precisa de uma imagem própria até o cutover (quando o main.yml passa a apontar p/ /api/v2
# e este workflow pode ser removido). Disparo manual: gh workflow run frontend-homelab.yml
name: Build Frontend (homelab v2)

on:
  workflow_dispatch:

env:
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/football-manager-frontend

jobs:
  build:
    name: Build & Push (homelab-v2)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push — Frontend (API v2)
        uses: docker/build-push-action@v7
        with:
          context: ./football-frontend
          file: ./football-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:homelab-v2
            ${{ env.FRONTEND_IMAGE }}:homelab-${{ github.sha }}
          build-args: |
            VITE_API_URL=https://api.rachao.app/api/v2
            PUBLIC_LEGAL_CONTROLLER_NAME=${{ secrets.LEGAL_CONTROLLER_NAME }}
            PUBLIC_LEGAL_CONTROLLER_DOC=${{ secrets.LEGAL_CONTROLLER_DOC }}
            PUBLIC_LEGAL_FORUM_CITY=${{ secrets.LEGAL_FORUM_CITY }}
            PUBLIC_LEGAL_CONTACT_EMAIL=${{ secrets.LEGAL_CONTACT_EMAIL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
