name: CI

on:
  push:
    branches: [main]
    paths:
      - "football-api/**"
      - "football-frontend/**"
      - "football-e2e/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "football-api/**"
      - "football-frontend/**"
      - "football-e2e/**"
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1 — Testes unitários (rápido, sem banco real)
  # ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==1.8.2

      - name: Install dependencies
        working-directory: football-api
        run: poetry install --no-interaction

      - name: Run unit tests
        working-directory: football-api
        env:
          DATABASE_URL: "postgresql+asyncpg://fake:fake@localhost/fake"
          SECRET_KEY: "test-secret-key-for-ci-only"
        run: |
          poetry run pytest tests/unit/ \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: football-api/coverage.xml
          flags: unit
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — Testes E2E com stack completa (depende dos unitários)
  # ──────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env.docker for CI
        working-directory: football-api
        run: |
          cat > .env.docker << 'EOF'
          APP_ENV=development
          SECRET_KEY=ci-secret-key-for-e2e-tests-only-32chars
          CORS_ORIGINS=http://localhost:3000
          DEBUG=true
          STRIPE_SECRET_KEY=sk_test_fake
          STRIPE_WEBHOOK_SECRET=whsec_fake
          STRIPE_PRICE_BASIC_MONTHLY=price_fake
          STRIPE_PRICE_BASIC_YEARLY=price_fake
          STRIPE_PRICE_PRO_MONTHLY=price_fake
          STRIPE_PRICE_PRO_YEARLY=price_fake
          EOF

      - name: Start stack
        working-directory: football-api
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          echo "Aguardando API..."
          timeout 90 bash -c 'until curl -sf http://localhost:8000/health > /dev/null; do sleep 3; done'
          echo "API pronta ✓"

      - name: Wait for frontend to be ready
        run: |
          echo "Aguardando Frontend..."
          timeout 90 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 3; done'
          echo "Frontend pronto ✓"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: football-e2e/pyproject.toml

      - name: Install Python dependencies
        working-directory: football-e2e
        run: pip install -e .

      - name: Install Playwright browsers
        working-directory: football-e2e
        run: playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: football-e2e
        env:
          BASE_URL: http://localhost:3000
          ADMIN_WHATSAPP: "11999990000"
          ADMIN_PASSWORD: admin123
        run: |
          pytest tests/ -v \
            --screenshot=only-on-failure \
            --output=test-results/ \
            --tb=short

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ github.run_id }}
          path: football-e2e/test-results/
          retention-days: 7
