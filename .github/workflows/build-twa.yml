name: Build & Deploy TWA Android

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options: [internal, alpha, beta, production]
      upload_to_play_store:
        description: 'Upload AAB to Play Store?'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  build:
    name: Build & Upload AAB
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK components
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > football-android/rachao-release.keystore

      - name: Inject signing config into keystore.properties
        working-directory: football-android
        run: |
          cat > keystore.properties <<EOF
          storeFile=../rachao-release.keystore
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build AAB
        working-directory: football-android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/rachao-release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Locate AAB
        run: |
          find football-android -name "*.aab" 2>/dev/null
          cp football-android/app/build/outputs/bundle/release/app-release.aab \
             football-android/app-release-bundle.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rachao-twa-${{ github.sha }}
          path: football-android/app-release-bundle.aab
          retention-days: 30

      - name: Upload to Play Store
        if: ${{ github.event.inputs.upload_to_play_store == 'true' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.rachao
          releaseFiles: football-android/app-release-bundle.aab
          track: ${{ github.event.inputs.track }}
          status: completed

  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          R_BUILD: ${{ needs.build.result }}
          TRACK: ${{ github.event.inputs.track }}
          UPLOAD: ${{ github.event.inputs.upload_to_play_store }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          WORKFLOW: ${{ github.workflow }}
        run: |
          if [[ "$R_BUILD" == "success" ]]; then
            STATUS="✅ Sucesso"
          else
            STATUS="❌ Falha"
          fi

          NL=$'\n'
          UPLOAD_LINE=""
          [[ "$UPLOAD" == "true" ]] && UPLOAD_LINE="${NL}📲 Play Store: <b>${TRACK}</b>"
          MESSAGE="<b>🚀 rachao.app · ${WORKFLOW}</b>${NL}${NL}👤 ${ACTOR}  📝 <code>${SHA:0:7}</code>${UPLOAD_LINE}${NL}${NL}<b>${STATUS}</b>${NL}🔗 <a href=\"${RUN_URL}\">Ver execução</a>"

          jq -n --arg chat_id "$CHAT_ID" --arg text "$MESSAGE" \
            '{chat_id: $chat_id, parse_mode: "HTML", text: $text, disable_web_page_preview: true}' \
          | curl -sf -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" -d @- \
          || echo "::warning::Falha ao enviar notificação Telegram"
