name: Build & Deploy TWA Android

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options: [internal, alpha, beta, production]
      upload_to_play_store:
        description: 'Upload AAB to Play Store?'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  build:
    name: Build & Upload AAB
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK components
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > football-android/rachao-release.keystore

      - name: Inject signing config into keystore.properties
        working-directory: football-android
        run: |
          cat > keystore.properties <<EOF
          storeFile=../rachao-release.keystore
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build AAB
        working-directory: football-android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/rachao-release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Locate AAB
        run: |
          find football-android -name "*.aab" 2>/dev/null
          cp football-android/app/build/outputs/bundle/release/app-release.aab \
             football-android/app-release-bundle.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rachao-twa-${{ github.sha }}
          path: football-android/app-release-bundle.aab
          retention-days: 30

      - name: Upload to Play Store
        if: ${{ github.event.inputs.upload_to_play_store == 'true' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.rachao
          releaseFiles: football-android/app-release-bundle.aab
          track: ${{ github.event.inputs.track }}
          status: completed
