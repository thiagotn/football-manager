name: Deploy Homologação (beta + api-go v2)

# Sobe a stack de HOMOLOGAÇÃO (docker-compose.hml.yml): Postgres em container,
# api-go (/api/v2) e frontend-beta (beta.rachao.app). Desacoplado do main.yml (produção).
# Disparo apenas manual — não roda em push.

on:
  workflow_dispatch:

env:
  API_GO_IMAGE: ghcr.io/${{ github.repository_owner }}/football-manager-api-go
  FRONTEND_BETA_IMAGE: ghcr.io/${{ github.repository_owner }}/football-manager-frontend-beta
  DEPLOY_DIR: /opt/football-manager

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1 — Build da imagem do frontend de homologação
  # (a imagem api-go é reutilizada — buildada por api-go.yml / main.yml)
  # ──────────────────────────────────────────────────────────────
  build-frontend-beta:
    name: Build & Push frontend-beta
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push — frontend-beta
        uses: docker/build-push-action@v6
        with:
          context: ./football-frontend
          file: ./football-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_BETA_IMAGE }}:latest
            ${{ env.FRONTEND_BETA_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://api.rachao.app/api/v2
            VITE_BILLING_ENABLED=false
            PUBLIC_LEGAL_CONTROLLER_NAME=${{ secrets.LEGAL_CONTROLLER_NAME }}
            PUBLIC_LEGAL_CONTROLLER_DOC=${{ secrets.LEGAL_CONTROLLER_DOC }}
            PUBLIC_LEGAL_FORUM_CITY=${{ secrets.LEGAL_FORUM_CITY }}
            PUBLIC_LEGAL_CONTACT_EMAIL=${{ secrets.LEGAL_CONTACT_EMAIL }}
          cache-from: type=gha,scope=frontend-beta
          cache-to: type=gha,scope=frontend-beta,mode=max

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — Deploy da stack de homologação no VPS
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy HML stack to VPS
    runs-on: ubuntu-latest
    needs: build-frontend-beta
    environment: production
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Aguardar VPS disponível
        run: |
          HOST="${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT || 22 }}"
          for i in $(seq 1 6); do
            if nc -zw 8 "$HOST" "$PORT" 2>/dev/null; then echo "VPS acessível ✓"; exit 0; fi
            echo "Tentativa $i/6 — aguardando 20s..."; sleep 20
          done
          echo "Erro: VPS inacessível"; exit 1

      - name: Copiar arquivos da stack HML para o VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          timeout: 60s
          source: "football-api/docker-compose.hml.yml,football-api/migrations"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 1

      - name: Deploy
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          POSTGRES_PASSWORD_HML: ${{ secrets.POSTGRES_PASSWORD_HML }}
          OTP_BYPASS_CODE: ${{ secrets.OTP_BYPASS_CODE }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_VERIFY_SID: ${{ secrets.TWILIO_VERIFY_SID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_CLAIMS_EMAIL: ${{ secrets.VAPID_CLAIMS_EMAIL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          timeout: 60s
          command_timeout: 15m
          envs: GHCR_TOKEN,ACTOR,DEPLOY_DIR,POSTGRES_PASSWORD_HML,OTP_BYPASS_CODE,SECRET_KEY,TWILIO_ACCOUNT_SID,TWILIO_AUTH_TOKEN,TWILIO_VERIFY_SID,SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,ANTHROPIC_API_KEY,LLM_MODEL,STRIPE_SECRET_KEY,VAPID_PRIVATE_KEY,VAPID_PUBLIC_KEY,VAPID_CLAIMS_EMAIL
          script: |
            set -euo pipefail
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
            cd "$DEPLOY_DIR"

            # upsert dos secrets de HML em .env.hml
            for VAR in POSTGRES_PASSWORD_HML OTP_BYPASS_CODE SECRET_KEY TWILIO_ACCOUNT_SID TWILIO_AUTH_TOKEN TWILIO_VERIFY_SID SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY ANTHROPIC_API_KEY LLM_MODEL STRIPE_SECRET_KEY VAPID_PRIVATE_KEY VAPID_PUBLIC_KEY VAPID_CLAIMS_EMAIL; do
              VAL="${!VAR}"
              if [ -n "$VAL" ]; then
                if grep -q "^${VAR}=" .env.hml 2>/dev/null; then
                  sed -i "s|^${VAR}=.*|${VAR}=${VAL}|" .env.hml
                else
                  echo "${VAR}=${VAL}" >> .env.hml
                fi
              fi
            done

            set -a; source .env.hml; set +a

            echo "==> Pull das imagens da stack HML..."
            docker compose -f docker-compose.hml.yml -p football-manager-hml pull

            echo "==> Subindo stack de homologação..."
            docker compose -f docker-compose.hml.yml -p football-manager-hml up -d --remove-orphans

            docker image prune -f
            docker logout ghcr.io
            docker compose -f docker-compose.hml.yml -p football-manager-hml ps
