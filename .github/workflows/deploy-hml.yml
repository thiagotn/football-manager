name: Deploy Homologação (beta + api-go v2)

# Sobe a stack de HOMOLOGAÇÃO (docker-compose.hml.yml): Postgres em container,
# api-go (/api/v2) e frontend-beta (beta.rachao.app). Desacoplado do main.yml (produção).
# Disparo apenas manual — não roda em push. Gated por unit + integration + audit.

on:
  workflow_dispatch:

env:
  API_GO_IMAGE: ghcr.io/${{ github.repository_owner }}/football-manager-api-go
  FRONTEND_BETA_IMAGE: ghcr.io/${{ github.repository_owner }}/football-manager-frontend-beta
  DEPLOY_DIR: /opt/football-manager

jobs:
  # ──────────────────────────────────────────────────────────────
  # GATE 1 — Testes unitários (Go)
  # ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        run: |
          GOVERSION=$(curl -fsSL "https://go.dev/VERSION?m=text" | head -1)
          curl -fsSL "https://go.dev/dl/${GOVERSION}.linux-amd64.tar.gz" | sudo tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
      - name: Run unit tests
        working-directory: football-api-go
        env:
          DATABASE_URL: "postgres://fake:fake@localhost/fake"
          SECRET_KEY: "test-secret-key-ci-only"
        run: go test ./internal/... ./tests/unit/... -count=1

  # ──────────────────────────────────────────────────────────────
  # GATE 2 — Testes de integração (Go + Postgres real)
  # ──────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rachao_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        run: |
          GOVERSION=$(curl -fsSL "https://go.dev/VERSION?m=text" | head -1)
          curl -fsSL "https://go.dev/dl/${GOVERSION}.linux-amd64.tar.gz" | sudo tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
      - name: Apply migrations
        env:
          PGPASSWORD: postgres
        run: |
          for f in $(ls football-api/migrations/*.sql | sort); do
            psql -h localhost -U postgres -d rachao_test -f "$f" || true
          done
      - name: Run integration tests
        working-directory: football-api-go
        env:
          DATABASE_URL: "postgres://postgres:postgres@localhost/rachao_test?sslmode=disable"
          SECRET_KEY: "test-secret-key-ci-only"
        run: go test ./tests/integration/... -v -timeout 120s -count=1

  # ──────────────────────────────────────────────────────────────
  # GATE 3 — Auditoria de segurança (govulncheck)
  # ──────────────────────────────────────────────────────────────
  audit:
    name: Security Audit (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        run: |
          GOVERSION=$(curl -fsSL "https://go.dev/VERSION?m=text" | head -1)
          curl -fsSL "https://go.dev/dl/${GOVERSION}.linux-amd64.tar.gz" | sudo tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
      - name: Run govulncheck
        working-directory: football-api-go
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  # ──────────────────────────────────────────────────────────────
  # BUILD — imagem do frontend de homologação
  # (a imagem api-go é reutilizada — buildada por api-go.yml / main.yml)
  # ──────────────────────────────────────────────────────────────
  build-frontend-beta:
    name: Build & Push frontend-beta
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, audit]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push — frontend-beta
        uses: docker/build-push-action@v6
        with:
          context: ./football-frontend
          file: ./football-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_BETA_IMAGE }}:latest
            ${{ env.FRONTEND_BETA_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://api.rachao.app/api/v2
            VITE_BILLING_ENABLED=false
            PUBLIC_LEGAL_CONTROLLER_NAME=${{ secrets.LEGAL_CONTROLLER_NAME }}
            PUBLIC_LEGAL_CONTROLLER_DOC=${{ secrets.LEGAL_CONTROLLER_DOC }}
            PUBLIC_LEGAL_FORUM_CITY=${{ secrets.LEGAL_FORUM_CITY }}
            PUBLIC_LEGAL_CONTACT_EMAIL=${{ secrets.LEGAL_CONTACT_EMAIL }}
          cache-from: type=gha,scope=frontend-beta
          cache-to: type=gha,scope=frontend-beta,mode=max

  # ──────────────────────────────────────────────────────────────
  # DEPLOY — sobe a stack de homologação no VPS
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy HML stack to VPS
    runs-on: ubuntu-latest
    needs: build-frontend-beta
    environment: production
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Aguardar VPS disponível
        run: |
          HOST="${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT || 22 }}"
          for i in $(seq 1 6); do
            if nc -zw 8 "$HOST" "$PORT" 2>/dev/null; then echo "VPS acessível ✓"; exit 0; fi
            echo "Tentativa $i/6 — aguardando 20s..."; sleep 20
          done
          echo "Erro: VPS inacessível"; exit 1

      - name: Copiar arquivos da stack HML para o VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          timeout: 60s
          # traefik-dynamic.yml inclui o router beta.rachao.app; o Traefik (file provider,
          # watch=true) recarrega ao detectar a mudança e emite o cert Let's Encrypt.
          source: "football-api/docker-compose.hml.yml,football-api/migrations,football-api/traefik-dynamic.yml"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 1

      - name: Deploy
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          POSTGRES_PASSWORD_HML: ${{ secrets.POSTGRES_PASSWORD_HML }}
          OTP_BYPASS_CODE: ${{ secrets.OTP_BYPASS_CODE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          timeout: 60s
          command_timeout: 15m
          envs: GHCR_TOKEN,ACTOR,DEPLOY_DIR,POSTGRES_PASSWORD_HML,OTP_BYPASS_CODE
          script: |
            set -euo pipefail
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
            cd "$DEPLOY_DIR"

            # A stack HML reaproveita os secrets compartilhados de produção (.env.prod):
            # SECRET_KEY, TWILIO_*, SUPABASE_*, ANTHROPIC_API_KEY, LLM_MODEL, STRIPE_SECRET_KEY, VAPID_*.
            if [ ! -f .env.prod ]; then
              echo "ERRO: .env.prod ausente — a stack de produção precisa estar provisionada antes do HML."
              exit 1
            fi

            # upsert apenas dos secrets específicos de HML em .env.hml
            for VAR in POSTGRES_PASSWORD_HML OTP_BYPASS_CODE; do
              VAL="${!VAR}"
              if [ -n "$VAL" ]; then
                if grep -q "^${VAR}=" .env.hml 2>/dev/null; then
                  sed -i "s|^${VAR}=.*|${VAR}=${VAL}|" .env.hml
                else
                  echo "${VAR}=${VAL}" >> .env.hml
                fi
              fi
            done

            # carrega compartilhados (.env.prod) + específicos de HML (.env.hml)
            set -a; source .env.prod; source .env.hml; set +a

            # O api-go migrou de produção para a stack HML. Se o container antigo
            # (projeto football-manager) ainda existir, ele é órfão e colide com o
            # nome/alias 'api-go' — removê-lo antes de subir a stack de homologação.
            if docker inspect football-api-go >/dev/null 2>&1; then
              echo "==> Removendo container api-go órfão de produção..."
              docker rm -f football-api-go || true
            fi

            echo "==> Pull das imagens da stack HML..."
            docker compose -f docker-compose.hml.yml -p football-manager-hml pull

            echo "==> Subindo stack de homologação..."
            docker compose -f docker-compose.hml.yml -p football-manager-hml up -d --remove-orphans

            docker image prune -f
            docker logout ghcr.io
            docker compose -f docker-compose.hml.yml -p football-manager-hml ps
