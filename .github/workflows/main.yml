name: Build & Deploy Web

on:
  workflow_dispatch:

env:
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/football-manager-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/football-manager-frontend
  MCP_IMAGE: ghcr.io/${{ github.repository_owner }}/football-manager-mcp
  DEPLOY_DIR: /opt/football-manager
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 0 — Detecta quais paths mudaram (permite pular jobs desnecessários)
  # ──────────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'football-api/**'
              - '!football-api/monitoring/**'
              - '!football-api/docker-compose.monitoring*.yml'
            frontend:
              - 'football-frontend/**'
            e2e:
              - 'football-e2e/**'
            mcp:
              - 'football-mcp/**'

  # ──────────────────────────────────────────────────────────────
  # JOB 1 — Testes unitários (rápido, sem banco real)
  # ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: football-api/poetry.lock

      - name: Install Poetry
        run: pip install poetry==1.8.2

      - name: Install dependencies
        working-directory: football-api
        run: poetry install --no-interaction

      - name: Audit Python dependencies
        working-directory: football-api
        run: |
          pip install pip-audit
          poetry export -f requirements.txt --without-hashes --without dev -o /tmp/requirements.txt
          pip-audit -r /tmp/requirements.txt --ignore-vuln CVE-2024-23342

      - name: Run unit tests
        working-directory: football-api
        env:
          DATABASE_URL: "postgresql+asyncpg://fake:fake@localhost/fake"
          SECRET_KEY: "test-secret-key-for-ci-only"
        run: |
          poetry run pytest tests/unit/ \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: football-api/coverage.xml
          flags: unit
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────
  # JOB 1b — Testes unitários do MCP server
  # ──────────────────────────────────────────────────────────────
  mcp-tests:
    name: MCP Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.mcp == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: football-mcp/pyproject.toml

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: football-mcp
        run: uv pip install --system -e ".[dev]"

      - name: Run MCP unit tests
        working-directory: football-mcp
        env:
          RACHAO_TOKEN: "test-token-for-ci"
        run: |
          pytest tests/ \
            --tb=short \
            --cov=rachao_mcp \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: football-mcp/coverage.xml
          flags: mcp
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────
  # JOB 1c — Auditoria de vulnerabilidades npm
  # ──────────────────────────────────────────────────────────────
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit npm dependencies (production only)
        working-directory: football-frontend
        run: npm audit --audit-level=high --package-lock-only --omit=dev

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — Testes E2E com stack completa
  #   Aguarda unit-tests se ele rodou; caso contrário segue mesmo assim
  # ──────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [changes, unit-tests]
    timeout-minutes: 20
    if: >-
      always() &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      (needs.changes.outputs.api == 'true' || needs.changes.outputs.frontend == 'true' ||
       needs.changes.outputs.e2e == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v5

      - name: Create .env.docker for CI
        working-directory: football-api
        run: |
          cat > .env.docker << 'EOF'
          APP_ENV=development
          SECRET_KEY=ci-secret-key-for-e2e-tests-only-32chars
          CORS_ORIGINS=http://localhost:3000
          DEBUG=true
          STRIPE_SECRET_KEY=sk_test_fake
          STRIPE_WEBHOOK_SECRET=whsec_fake
          STRIPE_PRICE_BASIC_MONTHLY=price_fake
          STRIPE_PRICE_BASIC_YEARLY=price_fake
          STRIPE_PRICE_PRO_MONTHLY=price_fake
          STRIPE_PRICE_PRO_YEARLY=price_fake
          EOF

      - name: Start stack
        working-directory: football-api
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          echo "Aguardando API..."
          timeout 90 bash -c 'until curl -sf http://localhost:8000/health > /dev/null; do sleep 3; done'
          echo "API pronta ✓"

      - name: Wait for frontend to be ready
        run: |
          echo "Aguardando Frontend..."
          timeout 90 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 3; done'
          echo "Frontend pronto ✓"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: football-e2e/pyproject.toml

      - name: Install Python dependencies
        working-directory: football-e2e
        run: pip install -e .

      - name: Install Playwright browsers
        working-directory: football-e2e
        run: playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: football-e2e
        env:
          BASE_URL: http://localhost:3000
          ADMIN_WHATSAPP: "11999990000"
          ADMIN_PASSWORD: admin123
        run: |
          pytest tests/ -v \
            --ignore=tests/test_stripe_webhooks.py \
            --screenshot=only-on-failure \
            --output=test-results/ \
            --tb=short

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ github.run_id }}
          path: football-e2e/test-results/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # JOB 3 — Build das imagens Docker e push para o GHCR
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [unit-tests, mcp-tests, e2e, npm-audit]
    permissions:
      contents: read
      packages: write
    if: >-
      always() &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      (needs.mcp-tests.result == 'success' || needs.mcp-tests.result == 'skipped') &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
      (needs.npm-audit.result == 'success' || needs.npm-audit.result == 'skipped')
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push — API
        uses: docker/build-push-action@v7
        with:
          context: ./football-api
          file: ./football-api/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push — MCP
        uses: docker/build-push-action@v7
        with:
          context: ./football-mcp
          file: ./football-mcp/Dockerfile
          push: true
          tags: |
            ${{ env.MCP_IMAGE }}:latest
            ${{ env.MCP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,scope=mcp,mode=max

      - name: Build & push — Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./football-frontend
          file: ./football-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://api.rachao.app/api/v1
            PUBLIC_LEGAL_CONTROLLER_NAME=${{ secrets.LEGAL_CONTROLLER_NAME }}
            PUBLIC_LEGAL_CONTROLLER_DOC=${{ secrets.LEGAL_CONTROLLER_DOC }}
            PUBLIC_LEGAL_FORUM_CITY=${{ secrets.LEGAL_FORUM_CITY }}
            PUBLIC_LEGAL_CONTACT_EMAIL=${{ secrets.LEGAL_CONTACT_EMAIL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ──────────────────────────────────────────────────────────────
  # JOB 4 — Deploy no VPS via SSH
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production
    timeout-minutes: 20
    if: always() && needs.build.result == 'success'

    steps:
      - uses: actions/checkout@v5

      - name: Aguardar VPS disponível
        run: |
          HOST="${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT || 22 }}"
          echo "Verificando conectividade SSH em $HOST:$PORT..."
          for i in $(seq 1 6); do
            if nc -zw 8 "$HOST" "$PORT" 2>/dev/null; then
              echo "VPS acessível ✓"
              exit 0
            fi
            echo "Tentativa $i/6 — aguardando 20s..."
            sleep 20
          done
          echo "Erro: VPS inacessível após 6 tentativas (~2 min)"
          exit 1

      - name: Copiar arquivos para o VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          timeout: 60s
          source: "football-api/docker-compose.prod.yml,football-api/traefik-dynamic.yml,football-api/migrations"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 1

      - name: Deploy
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_CLAIMS_EMAIL: ${{ secrets.VAPID_CLAIMS_EMAIL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_BASIC_MONTHLY: ${{ secrets.STRIPE_PRICE_BASIC_MONTHLY }}
          STRIPE_PRICE_BASIC_YEARLY: ${{ secrets.STRIPE_PRICE_BASIC_YEARLY }}
          STRIPE_PRICE_PRO_MONTHLY: ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
          STRIPE_PRICE_PRO_YEARLY: ${{ secrets.STRIPE_PRICE_PRO_YEARLY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_VERIFY_SID: ${{ secrets.TWILIO_VERIFY_SID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MCP_RACHAO_TOKEN: ${{ secrets.MCP_RACHAO_TOKEN }}
          MCP_SECRET_KEY: ${{ secrets.MCP_SECRET_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          timeout: 60s
          command_timeout: 15m
          envs: GHCR_TOKEN,ACTOR,SHA,DEPLOY_DIR,VAPID_PRIVATE_KEY,VAPID_PUBLIC_KEY,VAPID_CLAIMS_EMAIL,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRICE_BASIC_MONTHLY,STRIPE_PRICE_BASIC_YEARLY,STRIPE_PRICE_PRO_MONTHLY,STRIPE_PRICE_PRO_YEARLY,DATABASE_URL,TWILIO_ACCOUNT_SID,TWILIO_AUTH_TOKEN,TWILIO_VERIFY_SID,SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,MCP_RACHAO_TOKEN,MCP_SECRET_KEY
          script: |
            set -euo pipefail

            echo "==> Login no GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin

            cd "$DEPLOY_DIR"

            for VAR in VAPID_PRIVATE_KEY VAPID_PUBLIC_KEY VAPID_CLAIMS_EMAIL STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET STRIPE_PRICE_BASIC_MONTHLY STRIPE_PRICE_BASIC_YEARLY STRIPE_PRICE_PRO_MONTHLY STRIPE_PRICE_PRO_YEARLY DATABASE_URL TWILIO_ACCOUNT_SID TWILIO_AUTH_TOKEN TWILIO_VERIFY_SID SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY MCP_RACHAO_TOKEN MCP_SECRET_KEY; do
              VAL="${!VAR}"
              if [ -n "$VAL" ]; then
                if grep -q "^${VAR}=" .env.prod 2>/dev/null; then
                  sed -i "s|^${VAR}=.*|${VAR}=${VAL}|" .env.prod
                else
                  echo "${VAR}=${VAL}" >> .env.prod
                fi
              fi
            done

            set -a; source .env.prod; set +a

            echo "==> [1/2] Pull das novas imagens (sha: $SHA)..."
            docker compose -f docker-compose.prod.yml pull

            echo "==> [2/2] Reiniciando todos os serviços..."
            docker compose -f docker-compose.prod.yml up -d \
              --force-recreate \
              --remove-orphans

            echo "==> Removendo imagens antigas..."
            docker image prune -f

            echo "==> Logout do GHCR..."
            docker logout ghcr.io

            echo ""
            echo "Deploy concluido com sucesso!"
            docker compose -f docker-compose.prod.yml ps
