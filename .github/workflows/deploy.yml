name: Deploy to Production

on:
  workflow_dispatch: # disparado manualmente via GitHub Actions UI

env:
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/football-manager-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/football-manager-frontend
  DEPLOY_DIR: /opt/football-manager

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 0 — Testes unitários (pré-requisito para build e deploy)
  # ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==1.8.2

      - name: Install dependencies
        working-directory: football-api
        run: poetry install --no-interaction

      - name: Run unit tests
        working-directory: football-api
        env:
          DATABASE_URL: "postgresql+asyncpg://fake:fake@localhost/fake"
          SECRET_KEY: "test-secret-key-for-ci-only"
        run: |
          poetry run pytest tests/unit/ \
            --tb=short \
            -q

  # ──────────────────────────────────────────────────────────────
  # JOB 1 — Build das imagens Docker e push para o GHCR
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write # necessário para push no GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push — API
        uses: docker/build-push-action@v6
        with:
          context: ./football-api
          dockerfile: ./football-api/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push — Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./football-frontend
          dockerfile: ./football-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://api.rachao.app/api/v1
            PUBLIC_LEGAL_CONTROLLER_NAME=${{ secrets.LEGAL_CONTROLLER_NAME }}
            PUBLIC_LEGAL_CONTROLLER_DOC=${{ secrets.LEGAL_CONTROLLER_DOC }}
            PUBLIC_LEGAL_FORUM_CITY=${{ secrets.LEGAL_FORUM_CITY }}
            PUBLIC_LEGAL_CONTACT_EMAIL=${{ secrets.LEGAL_CONTACT_EMAIL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — Deploy no VPS via SSH
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production # habilita proteção de deploy no GitHub Settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Copia o compose e as migrations para o VPS
      - name: Copiar arquivos para o VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          source: "football-api/docker-compose.prod.yml,football-api/traefik-dynamic.yml,football-api/migrations"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 1 # remove o prefixo football-api/ dos caminhos

      # Faz pull das novas imagens e reinicia os containers
      - name: Deploy
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_CLAIMS_EMAIL: ${{ secrets.VAPID_CLAIMS_EMAIL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_BASIC_MONTHLY: ${{ secrets.STRIPE_PRICE_BASIC_MONTHLY }}
          STRIPE_PRICE_BASIC_YEARLY: ${{ secrets.STRIPE_PRICE_BASIC_YEARLY }}
          STRIPE_PRICE_PRO_MONTHLY: ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
          STRIPE_PRICE_PRO_YEARLY: ${{ secrets.STRIPE_PRICE_PRO_YEARLY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_VERIFY_SID: ${{ secrets.TWILIO_VERIFY_SID }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: GHCR_TOKEN,ACTOR,SHA,DEPLOY_DIR,VAPID_PRIVATE_KEY,VAPID_PUBLIC_KEY,VAPID_CLAIMS_EMAIL,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRICE_BASIC_MONTHLY,STRIPE_PRICE_BASIC_YEARLY,STRIPE_PRICE_PRO_MONTHLY,STRIPE_PRICE_PRO_YEARLY,DATABASE_URL,TWILIO_ACCOUNT_SID,TWILIO_AUTH_TOKEN,TWILIO_VERIFY_SID
          script: |
            set -euo pipefail

            echo "==> Login no GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin

            cd "$DEPLOY_DIR"

            # Injeta/atualiza vars VAPID no .env.prod
            for VAR in VAPID_PRIVATE_KEY VAPID_PUBLIC_KEY VAPID_CLAIMS_EMAIL STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET STRIPE_PRICE_BASIC_MONTHLY STRIPE_PRICE_BASIC_YEARLY STRIPE_PRICE_PRO_MONTHLY STRIPE_PRICE_PRO_YEARLY DATABASE_URL TWILIO_ACCOUNT_SID TWILIO_AUTH_TOKEN TWILIO_VERIFY_SID; do
              VAL="${!VAR}"
              if [ -n "$VAL" ]; then
                if grep -q "^${VAR}=" .env.prod 2>/dev/null; then
                  sed -i "s|^${VAR}=.*|${VAR}=${VAL}|" .env.prod
                else
                  echo "${VAR}=${VAL}" >> .env.prod
                fi
              fi
            done

            # Exporta variáveis do .env.prod para o shell (necessário para docker compose)
            set -a; source .env.prod; set +a

            echo "==> [1/2] Pull das novas imagens (sha: $SHA)..."
            docker compose -f docker-compose.prod.yml pull

            echo "==> [2/2] Reiniciando todos os serviços..."
            # A API aplica migrations automaticamente no startup (via app/db/migrate.py)
            # antes de começar a servir requisições.
            docker compose -f docker-compose.prod.yml up -d \
              --force-recreate \
              --remove-orphans

            echo "==> Removendo imagens antigas..."
            docker image prune -f

            echo "==> Logout do GHCR..."
            docker logout ghcr.io

            echo ""
            echo "Deploy concluido com sucesso!"
            docker compose -f docker-compose.prod.yml ps
