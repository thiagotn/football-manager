name: Build & Test API Go

on:
  workflow_dispatch: # disparado manualmente via GitHub Actions UI

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        run: |
          GOVERSION=$(curl -fsSL "https://go.dev/VERSION?m=text" | head -1)
          curl -fsSL "https://go.dev/dl/${GOVERSION}.linux-amd64.tar.gz" | sudo tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
      - name: Run unit tests
        working-directory: football-api-go
        env:
          DATABASE_URL: "postgres://fake:fake@localhost/fake"
          SECRET_KEY: "test-secret-key-ci-only"
        run: go test ./tests/unit/... -coverprofile=coverage-unit.out -covermode=atomic -coverpkg=./internal/apierror/...,./internal/config/...,./internal/handlers/...,./internal/middleware/...,./internal/services/...
      - name: Upload unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: football-api-go/coverage-unit.out

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rachao_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        run: |
          GOVERSION=$(curl -fsSL "https://go.dev/VERSION?m=text" | head -1)
          curl -fsSL "https://go.dev/dl/${GOVERSION}.linux-amd64.tar.gz" | sudo tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
      - name: Apply migrations
        env:
          PGPASSWORD: postgres
        run: |
          for f in $(ls football-api/migrations/*.sql | sort); do
            psql -h localhost -U postgres -d rachao_test -f "$f" || true
          done
      - name: Run integration tests
        working-directory: football-api-go
        env:
          DATABASE_URL: "postgres://postgres:postgres@localhost/rachao_test?sslmode=disable"
          SECRET_KEY: "test-secret-key-ci-only"
        run: go test ./tests/integration/... -coverprofile=coverage-integration.out -covermode=atomic -coverpkg=./internal/apierror/...,./internal/config/...,./internal/handlers/...,./internal/middleware/...,./internal/services/... -v -timeout 120s
      - name: Download unit coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: football-api-go/
      - name: Merge coverage profiles
        working-directory: football-api-go
        run: |
          head -1 coverage-unit.out > coverage.out
          tail -n +2 coverage-unit.out >> coverage.out
          tail -n +2 coverage-integration.out >> coverage.out
      - name: Upload merged coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: football-api-go/coverage.out
          flags: api-go
          fail_ci_if_error: false

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build & push Docker image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          IMAGE="ghcr.io/${REPO_OWNER}/football-manager-api-go"
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
          docker build --target production \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${SHA}" \
            ./football-api-go
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${SHA}"

  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, build]
    if: always()
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          R_UNIT: ${{ needs.unit-tests.result }}
          R_INTEG: ${{ needs.integration-tests.result }}
          R_BUILD: ${{ needs.build.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
        run: |
          icon() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "🚫" ;;
              skipped)   echo "⏭️" ;;
              *)         echo "❓" ;;
            esac
          }
          is_ok() { [[ "$1" == "success" || "$1" == "skipped" ]]; }

          if is_ok "$R_UNIT" && is_ok "$R_INTEG" && is_ok "$R_BUILD"; then
            STATUS="✅ Sucesso"
          else
            STATUS="❌ Falha"
          fi

          JOBS="$(icon "$R_UNIT") Unit Tests  |  $(icon "$R_INTEG") Integration  |  $(icon "$R_BUILD") Build"
          NL=$'\n'
          MESSAGE="<b>🚀 rachao.app · ${WORKFLOW}</b>${NL}${NL}🔀 <code>${REF_NAME}</code>  👤 ${ACTOR}  📝 <code>${SHA:0:7}</code>${NL}${NL}${JOBS}${NL}${NL}<b>${STATUS}</b>${NL}🔗 <a href=\"${RUN_URL}\">Ver execução</a>"

          jq -n --arg chat_id "$CHAT_ID" --arg text "$MESSAGE" \
            '{chat_id: $chat_id, parse_mode: "HTML", text: $text, disable_web_page_preview: true}' \
          | curl -sf -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" -d @- \
          || echo "::warning::Falha ao enviar notificação Telegram"
