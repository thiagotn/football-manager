name: Build & Test API Go

on:
  workflow_dispatch: # disparado manualmente via GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: football-api-go/go.sum
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin
      - name: Run golangci-lint
        working-directory: football-api-go
        run: golangci-lint run ./... --timeout=5m

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - name: Run unit tests
        working-directory: football-api-go
        env:
          DATABASE_URL: "postgres://fake:fake@localhost/fake"
          SECRET_KEY: "test-secret-key-ci-only"
        run: go test ./tests/unit/... -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/...
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: football-api-go/coverage.out
          flags: api-go
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rachao_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - name: Apply migrations
        env:
          PGPASSWORD: postgres
        run: |
          for f in $(ls football-api/migrations/*.sql | sort); do
            psql -h localhost -U postgres -d rachao_test -f "$f" || true
          done
      - name: Run integration tests
        working-directory: football-api-go
        env:
          DATABASE_URL: "postgres://postgres:postgres@localhost/rachao_test?sslmode=disable"
          SECRET_KEY: "test-secret-key-ci-only"
        run: go test ./tests/integration/... -v -timeout 120s

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ./football-api-go
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/football-manager-api-go:latest
            ghcr.io/${{ github.repository_owner }}/football-manager-api-go:${{ github.sha }}
          cache-from: type=gha,scope=api-go
          cache-to: type=gha,scope=api-go,mode=max

  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, build]
    if: always()
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          R_LINT: ${{ needs.lint.result }}
          R_UNIT: ${{ needs.unit-tests.result }}
          R_INTEG: ${{ needs.integration-tests.result }}
          R_BUILD: ${{ needs.build.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
        run: |
          icon() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "🚫" ;;
              skipped)   echo "⏭️" ;;
              *)         echo "❓" ;;
            esac
          }
          is_ok() { [[ "$1" == "success" || "$1" == "skipped" ]]; }

          if is_ok "$R_LINT" && is_ok "$R_UNIT" && is_ok "$R_INTEG" && is_ok "$R_BUILD"; then
            STATUS="✅ Sucesso"
          else
            STATUS="❌ Falha"
          fi

          JOBS="$(icon "$R_LINT") Lint  |  $(icon "$R_UNIT") Unit Tests  |  $(icon "$R_INTEG") Integration  |  $(icon "$R_BUILD") Build"
          NL=$'\n'
          MESSAGE="<b>🚀 rachao.app · ${WORKFLOW}</b>${NL}${NL}🔀 <code>${REF_NAME}</code>  👤 ${ACTOR}  📝 <code>${SHA:0:7}</code>${NL}${NL}${JOBS}${NL}${NL}<b>${STATUS}</b>${NL}🔗 <a href=\"${RUN_URL}\">Ver execução</a>"

          jq -n --arg chat_id "$CHAT_ID" --arg text "$MESSAGE" \
            '{chat_id: $chat_id, parse_mode: "HTML", text: $text, disable_web_page_preview: true}' \
          | curl -sf -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" -d @- \
          || echo "::warning::Falha ao enviar notificação Telegram"
